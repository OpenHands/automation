---
# Adds a git-tag name to existing Docker images.
# Triggered when a tag is pushed: finds the images built at the tag's commit
# (tagged `sha-<full>`) and adds the tag name as an alias for the same manifest.
# Semver tags (X.Y.Z) also get X.Y, X, and latest aliases.
# No rebuild — pure registry-side retag via `docker buildx imagetools create`.
name: Tag Docker images

on:
    push:
        tags:
            - '*'

jobs:
    retag:
        runs-on: ubuntu-24.04
        permissions:
            packages: write
        steps:
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Compute tags
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/openhands/automation
                  flavor: latest=auto
                  tags: |
                      type=ref,event=tag
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}

            - name: Add tags to existing image
              env:
                  SRC: ghcr.io/openhands/automation:sha-${{ github.sha }}
                  TAGS: ${{ steps.meta.outputs.tags }}
              shell: bash
              run: |
                  set -euo pipefail
                  # The Docker build workflow runs concurrently with this one, so the
                  # source image may not be available yet. Retry for up to 5 minutes.
                  MAX_ATTEMPTS=30
                  SLEEP_SECS=10
                  for i in $(seq 1 $MAX_ATTEMPTS); do
                    if docker buildx imagetools inspect "$SRC" > /dev/null 2>&1; then
                      echo "Source image available (attempt $i)"
                      break
                    fi
                    if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
                      echo "::error::Source image $SRC not found after $((MAX_ATTEMPTS * SLEEP_SECS))s. The Docker build for commit ${{ github.sha }} may have failed."
                      exit 1
                    fi
                    echo "Waiting for source image (attempt $i/$MAX_ATTEMPTS)..."
                    sleep $SLEEP_SECS
                  done
                  args=()
                  while IFS= read -r tag; do
                    [[ -z "$tag" ]] && continue
                    args+=(-t "$tag")
                  done <<< "$TAGS"
                  docker buildx imagetools create "${args[@]}" "$SRC"
