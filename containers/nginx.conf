# Nginx configuration for combined Agent Server GUI + Automation service
#
# Routes:
#   /                     -> Agent Server GUI (static files)
#   /api/*                -> Agent Server (port 3002)
#   /sockets              -> Agent Server WebSocket (port 3002)
#   /server_info          -> Agent Server info (port 3002)
#   /health               -> Agent Server health (port 3002)
#   /automations/*        -> Automation GUI (static files)
#   /api/automation/*     -> Automation Service (port 8001) [higher priority]

user root;
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream servers
    upstream agent_server {
        server 127.0.0.1:3002;
    }

    upstream automation {
        server 127.0.0.1:8001;
    }

    server {
        listen 8000 default_server;
        server_name _;

        # Client body size for file uploads
        client_max_body_size 100M;

        # ---- Automation Service Routes ----
        
        # Automation API (higher priority than /api/*)
        location /api/automation/ {
            proxy_pass http://automation/api/automation/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE/streaming support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # Automation GUI (static files with SPA fallback)
        location /automations/ {
            alias /app/automation-frontend/;
            try_files $uri $uri/ /automations/index.html;
            
            # Cache static assets
            location ~* /automations/assets/ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
        
        # Redirect /automations to /automations/
        location = /automations {
            return 301 /automations/;
        }

        # ---- Agent Server Routes ----
        
        # Agent Server API (all /api/* except /api/automation/*)
        location /api/ {
            proxy_pass http://agent_server/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE support for streaming events
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # WebSocket endpoint for real-time communication
        location /sockets {
            proxy_pass http://agent_server/sockets;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        # Server info endpoint
        location = /server_info {
            proxy_pass http://agent_server/server_info;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Health check
        location = /health {
            proxy_pass http://agent_server/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Ready check
        location = /ready {
            proxy_pass http://agent_server/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Alive check
        location = /alive {
            proxy_pass http://agent_server/alive;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- Agent Server GUI (default) ----
        
        # Serve agent-server-gui frontend as the main UI
        location / {
            root /app/gui-frontend;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* /assets/ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # Don't cache index.html
            location = /index.html {
                add_header Cache-Control "no-cache, must-revalidate";
            }
        }
    }
}
